{% load static i18n %}

{% block head %}
    <link href="{% static 'css/user_profile.css' %}?v=1" rel="stylesheet">
{% endblock head %}

{% block content %}
    {% if users %}
        {% include "users/includes/partial_user.html" with users=users %}
    {% else %}
        <div class="card p-4 my-4">
            <div class="text-center">
                <h6>No Contacts Found</h6>
                <p class="text-muted mb-0">You don't have any contacts right now.</p>
            </div>
        </div>
    {% endif %}

{% endblock content %}
