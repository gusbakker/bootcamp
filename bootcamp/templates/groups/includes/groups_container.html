<div class="card border-0 shadow-sm mb-4">
  <div class="card-header bg-transparent">
    <h5 class="card-title mb-0">Subscribed Groups</h5>
  </div>
  <div class="card-body">
    <div class="d-flex flex-wrap gap-2 mb-3">
      {% for group in groups_list %}
        <a href="{{ group.get_absolute_url }}" class="badge bg-light text-dark text-decoration-none px-3 py-2 rounded-pill">
          {{ group.title }}
        </a>
      {% empty %}
        <p class="text-muted mb-0">You haven't subscribed to any groups yet.</p>
      {% endfor %}
    </div>

    <div class="d-flex gap-2 mt-3">
      <a href="{% url 'groups:list' %}" class="btn btn-sm btn-primary">
        <i class="fa-solid fa-compass me-1"></i>Discover Groups
      </a>
      <a href="{% url 'groups:user_created_groups' user.username %}" class="btn btn-sm btn-outline-primary">
        <i class="fa-solid fa-folder me-1"></i>My Groups
      </a>
    </div>
  </div>
</div>
