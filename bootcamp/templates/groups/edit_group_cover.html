{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}<title>Change Your Group Cover</title>{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-transparent">
          <h5 class="card-title mb-0">Change Your Group Cover</h5>
        </div>
        <div class="card-body">
          {% if group_form.errors %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
              {{group_form.errors}}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          {% endif %}

          <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
              <label for="id_cover" class="form-label">Cover photo</label>
              <input type="file" class="form-control" id="id_cover" name="cover" accept="image/*">
              <div class="form-text">Upload an image to use as your group's cover photo.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="submit_cover">Submit</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript">
document.addEventListener('DOMContentLoaded', function() {
  // Check file size
  const coverInput = document.getElementById('id_cover');
  const submitButton = document.getElementById('submit_cover');

  coverInput.addEventListener('change', function() {
    const fileSize = this.files[0].size;
    if (fileSize > 2097152) {
      alert("Image size should be less than 2 megabytes.");
      submitButton.disabled = true;
    } else {
      submitButton.disabled = false;
    }
  });
});
</script>
{% endblock %}
