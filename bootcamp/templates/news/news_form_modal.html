{% load i18n %}

<div class="modal fade" id="newsFormModal" tabindex="-1" aria-labelledby="newsFormModalTitle" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark">
      <div class="modal-header border-bottom border-dark">
        <h5 class="modal-title fw-bold text-light" id="newsFormModalTitle">
          {% if group %}
            {% trans "Share something with" %} {{ group.title }}
          {% else %}
            {% trans "Share something new!" %}
          {% endif %}
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form enctype="multipart/form-data" id="postNewsForm" role="form" method="post" action="">
          {% csrf_token %}
          {% if group %}
          <input type="hidden" name="group" value="{{ group.id }}">
          {% endif %}
          <div class="mb-3">
            <textarea id="newsInput" name="post" rows="3" class="form-control bg-dark text-light border-dark" maxlength="280" placeholder="{% trans 'What\'s on your mind?' %}"></textarea>
            <div class="d-flex justify-content-end mt-2">
              <span id="newsCounter" class="text-muted small">280</span>
            </div>

            <!-- Uploaded image preview -->
            <div id="imagePreviewContainer" class="mt-3 position-relative d-none">
              <img id="imageResult" src="#" alt="" class="img-fluid rounded shadow-sm mx-auto d-block" style="max-height: 250px;">
              <button type="button" id="removeImage" class="btn btn-danger position-absolute top-0 end-0 m-2">
                <i class="fa-solid fa-times"></i>
              </button>
            </div>

            <!-- Upload image area -->
            <div id="uploadImageArea" class="mt-3 upload-area">
              <input id="imageInput" type="file" name="image" class="d-none" accept="image/*">
              <div class="upload-area-inner">
                <div class="upload-icon">
                  <i class="fa-regular fa-image"></i>
                </div>
                <span class="upload-text">{% trans 'Add an image' %}</span>
                <span class="upload-hint">{% trans 'Drag & drop or click to upload' %}</span>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer border-top border-dark">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans 'Cancel' %}</button>
        <button type="button" id="postNews" class="btn btn-primary">
          <i class="fa-regular fa-paper-plane me-2"></i>{% trans 'Post' %}
        </button>
      </div>
    </div>
  </div>
</div>

<style>
  /* Upload area styling */
  .upload-area {
    border: 2px dashed #515151;
    border-radius: 0.75rem;
    transition: all 0.2s ease;
    cursor: pointer;
    background-color: rgba(255, 255, 255, 0.05);
    position: relative;
  }

  .upload-area:hover {
    border-color: var(--bs-primary);
    background-color: rgba(var(--bs-primary-rgb), 0.05);
  }

  .upload-area-inner {
    padding: 1.5rem;
    text-align: center;
  }

  .upload-icon {
    font-size: 2rem;
    color: var(--bs-primary);
    margin-bottom: 0.5rem;
  }

  .upload-text {
    display: block;
    font-weight: 500;
    margin-bottom: 0.25rem;
    color: var(--bs-light);
  }

  .upload-hint {
    display: block;
    font-size: 0.875rem;
    color: var(--bs-secondary);
    margin-bottom: 0.5rem;
  }

  .upload-area.highlight {
    border-color: var(--bs-primary);
    background-color: rgba(var(--bs-primary-rgb), 0.1);
  }

  #imagePreviewContainer {
    position: relative;
    border-radius: 0.75rem;
    overflow: hidden;
    box-shadow: 0 0.25rem 0.5rem rgba(0, 0, 0, 0.2);
  }

  #removeImage {
    opacity: 0.8;
    transition: opacity 0.2s ease;
  }

  #removeImage:hover {
    opacity: 1;
  }

  /* Light mode styling */
  [data-theme="light"] .upload-area {
    border-color: #dee2e6;
    background-color: rgba(0, 0, 0, 0.02);
  }

  [data-theme="light"] .upload-text {
    color: var(--bs-dark);
  }

  [data-theme="light"] .upload-hint {
    color: var(--bs-gray-600);
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Image upload handling
    const imageInput = document.getElementById('imageInput');
    const imageResult = document.getElementById('imageResult');
    const removeImage = document.getElementById('removeImage');
    const uploadImageArea = document.getElementById('uploadImageArea');
    const imagePreviewContainer = document.getElementById('imagePreviewContainer');

    // Handle click on upload area
    uploadImageArea.addEventListener('click', () => {
      imageInput.click();
    });

    // Handle image selection
    imageInput.addEventListener('change', function() {
      if (this.files && this.files[0]) {
        const reader = new FileReader();

        reader.onload = function(e) {
          imageResult.src = e.target.result;
          uploadImageArea.classList.add('d-none');
          imagePreviewContainer.classList.remove('d-none');
        }

        reader.readAsDataURL(this.files[0]);
      }
    });

    // Handle remove image button
    removeImage.addEventListener('click', function() {
      imageInput.value = '';
      imageResult.src = '';
      imagePreviewContainer.classList.add('d-none');
      uploadImageArea.classList.remove('d-none');
    });

    // Drag and drop functionality
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      uploadImageArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
      uploadImageArea.addEventListener(eventName, highlight, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      uploadImageArea.addEventListener(eventName, unhighlight, false);
    });

    function highlight() {
      uploadImageArea.classList.add('highlight');
    }

    function unhighlight() {
      uploadImageArea.classList.remove('highlight');
    }

    uploadImageArea.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
      const dt = e.dataTransfer;
      const files = dt.files;

      if (files && files.length) {
        imageInput.files = files;

        // Trigger change event
        const event = new Event('change');
        imageInput.dispatchEvent(event);
      }
    }

    // Character counter
    const newsInput = document.getElementById('newsInput');
    const newsCounter = document.getElementById('newsCounter');

    newsInput.addEventListener('keyup', function() {
      const charCount = this.value.length;
      newsCounter.textContent = 280 - charCount;

      if (charCount > 240) {
        newsCounter.classList.add('text-danger');
      } else {
        newsCounter.classList.remove('text-danger');
      }
    });

    // Light/Dark mode adaptation
    function updateModalTheme() {
      const isLightMode = document.documentElement.getAttribute('data-theme') === 'light';
      const modal = document.querySelector('#newsFormModal .modal-content');
      const inputs = document.querySelectorAll('#newsFormModal .form-control, #newsFormModal .input-group-text');
      const modalTitle = document.querySelector('#newsFormModal .modal-title');
      const borders = document.querySelectorAll('#newsFormModal .border-dark');
      const closeBtn = document.querySelector('#newsFormModal .btn-close');

      if (isLightMode) {
        modal.classList.remove('bg-dark');
        modal.classList.add('bg-white');

        inputs.forEach(input => {
          input.classList.remove('bg-dark', 'text-light', 'border-dark');
          input.classList.add('bg-white', 'text-dark', 'border-light');
        });

        modalTitle.classList.remove('text-light');
        modalTitle.classList.add('text-dark');

        borders.forEach(border => {
          border.classList.remove('border-dark');
          border.classList.add('border-light');
        });

        closeBtn.classList.remove('btn-close-white');
      } else {
        modal.classList.add('bg-dark');
        modal.classList.remove('bg-white');

        inputs.forEach(input => {
          input.classList.add('bg-dark', 'text-light', 'border-dark');
          input.classList.remove('bg-white', 'text-dark', 'border-light');
        });

        modalTitle.classList.add('text-light');
        modalTitle.classList.remove('text-dark');

        borders.forEach(border => {
          border.classList.add('border-dark');
          border.classList.remove('border-light');
        });

        closeBtn.classList.add('btn-close-white');
      }
    }

    // Run on initial load
    updateModalTheme();

    // Listen for theme changes
    const darkSwitch = document.getElementById('darkSwitch');
    if (darkSwitch) {
      darkSwitch.addEventListener('change', function() {
        setTimeout(updateModalTheme, 50);
      });
    }
  });
</script>
