{% load i18n static %}
{% load thumbnail %}

<div id="newsThreadModal"
  class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center px-4">
  <div
    class="bg-fb-lightSurface dark:bg-fb-surface w-full max-w-[600px] max-h-[90vh] rounded-xl shadow-2xl border border-fb-lightBorder dark:border-fb-border flex flex-col modal-enter relative"
    onclick="event.stopPropagation()">

    <!-- Header -->
    <div class="flex items-center justify-center p-4 border-b border-fb-lightBorder dark:border-fb-border relative">
      <h2 class="text-xl font-bold text-fb-lightText dark:text-fb-text" id="newsThreadModalLabel">
        {% trans "Comments" %}
      </h2>
      <button type="button" onclick="toggleModal('newsThreadModal')"
        class="absolute right-4 w-9 h-9 rounded-full bg-fb-lightSurfaceHover dark:bg-fb-surfaceHover hover:brightness-90 dark:hover:bg-[#4e4f50] flex items-center justify-center text-fb-lightMuted dark:text-fb-muted transition">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
    </div>

    <!-- Original Post / Parent -->
    <div class="px-4 pt-4 pb-0 bg-fb-lightSurface dark:bg-fb-surface flex-shrink-0">
      <ul class="stream list-none p-0 m-0" id="newsContent"></ul>
    </div>

    <!-- Comments Area (Scrollable) -->
    <div class="px-4 py-2 overflow-y-auto flex-grow h-full bg-fb-lightSurface dark:bg-fb-surface">
      <ul class="stream list-none p-0 m-0 space-y-3" id="threadContent"></ul>
    </div>

    <!-- Reply Form -->
    <div
      class="px-4 py-3 border-t border-fb-lightBorder dark:border-fb-border bg-fb-lightSurface dark:bg-fb-surface rounded-b-xl flex-shrink-0">
      <form id="replyNewsForm" role="form" method="post" action="#" onsubmit="return false"
        class="w-full m-0 flex gap-2">
        {% csrf_token %}
        <input type="hidden" name="parent" value="">

        <img src="{{ user.get_picture }}" class="w-9 h-9 rounded-full object-cover">

        <div
          class="flex-grow flex items-center bg-fb-lightBg dark:bg-fb-bg rounded-2xl px-3 py-1 border border-transparent focus-within:border-fb-primary transition">
          <textarea id="replyInput" name="reply"
            class="w-full bg-transparent border-none outline-none resize-none text-[15px] pt-1.5 placeholder-fb-lightMuted dark:placeholder-fb-muted text-fb-lightText dark:text-fb-text h-9 no-scrollbar"
            maxlength="280" placeholder="{% trans 'Write a comment...' %}"></textarea>

          <button type="button" id="replyNews"
            class="w-7 h-7 flex-shrink-0 rounded-full flex items-center justify-center text-fb-primary hover:bg-fb-lightSurfaceHover dark:hover:bg-fb-surfaceHover transition">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>
      </form>
      <div class="flex justify-end mt-1 px-12">
        <span id="replyCounter" class="text-xs text-fb-lightMuted dark:text-fb-muted">280</span>
      </div>
    </div>

  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Character counter for reply
    const replyInput = document.getElementById('replyInput');
    const replyCounter = document.getElementById('replyCounter');
    const replyBtn = document.getElementById('replyNews');
    const replyForm = document.getElementById('replyNewsForm');

    replyInput.addEventListener('input', function () {
      const charCount = this.value.length;
      replyCounter.textContent = 280 - charCount;

      if (charCount > 240) {
        replyCounter.classList.add('text-red-500');
      } else {
        replyCounter.classList.remove('text-red-500');
      }

      // Auto-expand textarea incrementally
      this.style.height = '36px'; // base height
      let newHeight = this.scrollHeight;
      if (newHeight > 100) newHeight = 100; // max height
      if (this.value.trim().length > 0) {
        this.style.height = newHeight + 'px';
      }
    });

    // Enter key to submit comment (if not shift)
    replyInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (this.value.trim().length > 0) {
          $('#replyNews').click();
        }
      }
    });
  });
</script>
