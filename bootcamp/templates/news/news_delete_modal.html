<div id="newsDeleteModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 sm:p-0">
    <div class="fixed inset-0 bg-black bg-opacity-60 transition-opacity" aria-hidden="true" onclick="toggleModal('newsDeleteModal')"></div>
    <div class="relative bg-fb-lightSurface dark:bg-fb-surface sm:rounded-xl shadow-xl transform transition-all sm:max-w-lg sm:w-full overflow-hidden flex flex-col max-h-[90vh]">
        <div class="px-4 py-3 border-b border-fb-lightBorder dark:border-fb-border flex justify-between items-center bg-fb-lightSurface dark:bg-fb-surface sticky top-0 z-10">
            <h3 class="text-xl font-bold text-fb-lightText dark:text-fb-text mx-auto relative right-[-12px]">Delete Post</h3>
            <button onclick="toggleModal('newsDeleteModal')" class="w-9 h-9 rounded-full bg-fb-lightSurfaceHover dark:bg-fb-surfaceHover flex items-center justify-center text-fb-lightMuted dark:text-fb-muted hover:brightness-95 transition">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        <div class="p-5 text-fb-lightText dark:text-fb-text text-[15px] leading-relaxed relative">
            Are you sure you want to delete this post? This action cannot be undone.
            <input type="hidden" id="deletePostId" value="">
        </div>
        <div class="p-4 border-t border-fb-lightBorder dark:border-fb-border bg-fb-lightSurface dark:bg-fb-surface flex justify-end gap-3 sticky bottom-0 z-10 w-full">
            <button onclick="toggleModal('newsDeleteModal')" class="px-4 py-2 hover:bg-fb-lightSurfaceHover dark:hover:bg-fb-surfaceHover text-fb-primary font-semibold rounded-lg transition">Cancel</button>
            <button id="confirmDeletePostBtn" class="px-6 py-2 bg-fb-primary hover:bg-blue-600 text-white font-semibold rounded-lg transition shadow-sm">Delete</button>
        </div>
    </div>
</div>
